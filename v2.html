<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nasdaq Market Health Dashboard V2</title><script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>:root{--bg:#f5f6f8;--panel:#fff;--ink:#111827;--muted:#667085;--line:#e5e7eb;--green:#087443;--yellow:#b7791f;--orange:#c05621;--red:#b42318;--blue:#1d4ed8}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:24px 32px 12px;background:var(--panel);border-bottom:1px solid var(--line)}main{max-width:1440px;margin:0 auto;padding:20px 32px 40px}h1{margin:0 0 6px;font-size:26px}h2{margin:0 0 14px;font-size:18px}h3{margin:0 0 8px;font-size:15px}section{margin:0 0 18px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:8px}.sub,.small{color:var(--muted);font-size:13px}.grid{display:grid;gap:12px}.cards{grid-template-columns:repeat(4,minmax(0,1fr))}.two{grid-template-columns:repeat(2,minmax(360px,1fr))}.card{padding:16px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd;min-height:126px}.label{color:var(--muted);font-size:12px;margin-bottom:8px}.value{font-size:30px;font-weight:780}.delta{margin-top:8px;font-size:15px;font-weight:650}.state{margin-top:8px;display:inline-block;padding:3px 9px;border-radius:999px;background:#eef2f6;font-size:12px}.green{color:var(--green)}.yellow{color:var(--yellow)}.orange{color:var(--orange)}.red{color:var(--red)}.blue{color:var(--blue)}.alert{display:flex;align-items:center;justify-content:space-between;gap:16px}.alert-badge{font-size:24px;font-weight:780}.plot{width:100%;height:320px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--muted);font-weight:650}.tip{position:relative;display:inline-flex;align-items:center;padding:2px 6px;border-radius:6px;border-bottom:1px dotted var(--blue);color:var(--blue);cursor:help}.tip::after{content:attr(data-tip);position:absolute;left:0;top:calc(100% + 8px);z-index:20;width:310px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);box-shadow:0 10px 28px rgba(16,24,40,.16);white-space:pre-line;line-height:1.55;font-size:12px;opacity:0;transform:translateY(-4px);pointer-events:none;transition:opacity .12s ease,transform .12s ease}.tip:hover::after{opacity:1;transform:translateY(0)}@media(max-width:900px){header,main{padding-left:14px;padding-right:14px}.cards,.two{grid-template-columns:1fr}.alert{align-items:flex-start;flex-direction:column}.tip::after{left:auto;right:0;width:280px}}</style>
</head>
<body><header><h1>Nasdaq Market Health Dashboard V2</h1><div class="sub" id="headerMeta">Loading summary.json...</div></header><main><section><div class="alert"><div><h2>Market Alert</h2><div class="sub" id="alertReason"></div></div><div class="alert-badge" id="marketAlert"></div></div></section><section><h2>市场健康度总览</h2><div class="grid cards" id="healthCards"></div></section><section><h2>90天健康趋势</h2><div class="grid two"><div><h3>趋势评分变化</h3><div class="plot" id="trendPlot"></div></div><div><h3>风险评分变化</h3><div class="plot" id="riskPlot"></div></div><div><h3>Monte Carlo上涨概率变化</h3><div class="plot" id="mcPlot"></div></div><div><h3>AI周期评分变化</h3><div class="plot" id="aiPlot"></div></div></div></section><section><h2>市场分析</h2><div class="grid cards" id="marketAnalysis"></div></section><section><h2>AI周期明细</h2><div id="aiCycleTable"></div></section></main>
<script>fetch('summary.json',{cache:'no-store'}).then(r=>r.json()).then(summary=>{const history=(summary.market_health&&summary.market_health.history_90d)||[];const health=summary.market_health||{},current=health.current||{},changes=health.changes_30d||{},statuses=health.statuses||{},alert=health.alert||{level:'green',label:'正常',reason:'no alert'};const symbols=Object.keys(summary.symbols||{}),fmt=new Intl.NumberFormat('en-US',{maximumFractionDigits:2});const pct=v=>`${(Number(v)*100).toFixed(1)}%`,signed=v=>`${Number(v)>=0?'↑ +':'↓ '}${Math.abs(Number(v)).toFixed(2)}`,signedPct=v=>`${Number(v)>=0?'↑ +':'↓ '}${Math.abs(Number(v)*100).toFixed(1)}%`;headerMeta.textContent=`Data through ${summary.data_end} · generated ${summary.generated_at} · dashboard zero calculation`;const alertIcons={green:'🟢',yellow:'🟡',orange:'🟠',red:'🔴'};marketAlert.textContent=`${alertIcons[alert.level]||'🟢'} ${alert.label}`;alertReason.textContent=alert.reason||'';function card(label,value,delta,state,color=''){return `<div class="card"><div class="label">${label}</div><div class="value ${color}">${value}</div><div class="delta">近30天变化：${delta}</div><div class="state">${state}</div></div>`}function riskColor(v){return v<=3?'green':v<=6?'yellow':'red'}function escapeAttr(v){return String(v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}function table(headers,rows){return `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(v=>`<td>${v}</td>`).join('')}</tr>`).join('')}</tbody></table>`}function tooltipCell(symbol,kind,value){if(symbol!=='NDX')return value;const t=summary.ndx_tooltip||{},d=t.mc_distribution||{};let text='';if(kind==='ma200'){const q=Number(t.ma200_deviation_pct||0);text=`MA200：${fmt.format(t.ma200||0)}

当前价格：${fmt.format(t.current_price||0)}

偏离率：${q.toFixed(2)}%

当前价格${q>=0?'高于':'低于'}MA200 ${Math.abs(q).toFixed(2)}%

说明市场处于${q>=10?'较强趋势阶段':'相对温和阶段'}。

MA200偏离率越高，代表市场热度越高，AI周期评分贡献越大。`}else{text=`未来${t.mc_days||60}天概率分布

上涨 > 10%      ${Number(d.up_gt_10||0).toFixed(2)}%

上涨 0~10%      ${Number(d.up_0_10||0).toFixed(2)}%

下跌 0~5%       ${Number(d.down_0_5||0).toFixed(2)}%

下跌 5~10%      ${Number(d.down_5_10||0).toFixed(2)}%

下跌 > 10%      ${Number(d.down_gt_10||0).toFixed(2)}%

基于${t.mc_paths||5000}条路径。

未来60个交易日内，上涨超过10%的概率：${Number(d.up_gt_10||0).toFixed(2)}%

上涨0~10%的概率：${Number(d.up_0_10||0).toFixed(2)}%

下跌超过10%的概率：${Number(d.down_gt_10||0).toFixed(2)}%

该分布用于评估未来市场上涨与回撤风险。`}return `<span class="tip" data-tip="${escapeAttr(text)}">${value}</span>`}healthCards.innerHTML=[card('趋势强度',`${fmt.format(current.trend_score||0)} / 10`,signed(changes.trend_score||0),statuses.trend_strength||'稳定',(changes.trend_score||0)<-0.5?'red':'green'),card('风险水平',`${fmt.format(current.risk_score||0)} / 10`,signed(changes.risk_score||0),statuses.risk_level||'稳定',riskColor(current.risk_score||0)),card('Monte Carlo上涨概率',pct(current.mc_up_probability||0),signedPct(changes.mc_up_probability||0),statuses.mc_up_probability||'稳定',(changes.mc_up_probability||0)<-0.03?'red':'green'),card('AI牛市阶段',`${fmt.format(current.ai_cycle_score||0)}%`,signed(changes.ai_cycle_score||0),statuses.ai_cycle||'中期',(current.ai_cycle_score||0)>=75?'red':'blue')].join('');marketAnalysis.innerHTML=symbols.map(symbol=>{const item=summary.symbols[symbol];return `<div class="card"><div class="label">${symbol} ${item.ticker}</div><div class="value">${fmt.format(item.latest_close)}</div><div class="small">趋势 ${item.trend.trend_score} · 风险 ${item.risk.risk_score} · 上涨概率 ${pct(item.monte_carlo.probability_up)} · AI阶段 ${item.ai_cycle.stage}</div></div>`}).join('');aiCycleTable.innerHTML=table(['指数','AI周期评分','阶段','MA200偏离贡献','Monte Carlo贡献','波动率贡献','回撤贡献'],symbols.map(symbol=>{const ai=summary.symbols[symbol].ai_cycle,c=ai.components||{};return [symbol,`${fmt.format(ai.score)}%`,ai.stage,tooltipCell(symbol,'ma200',fmt.format(c.ma200_deviation||0)),tooltipCell(symbol,'mc',fmt.format(c.monte_carlo||0)),fmt.format(c.volatility||0),fmt.format(c.drawdown_risk||0)]}));drawLine('trendPlot','trend_score','趋势评分','#1d4ed8',false);drawLine('riskPlot','risk_score','风险评分','#b7791f',false);drawLine('mcPlot','mc_up_probability','上涨概率','#087443',true);drawLine('aiPlot','ai_cycle_score','AI周期评分','#7c3aed',false);function drawLine(id,field,name,color,asPct){const rows=history.slice(-90),y=rows.map(row=>row[field]);Plotly.newPlot(id,[{x:rows.map(row=>row.date),y,mode:'lines+markers',name,line:{color,width:2}}],{margin:{l:48,r:16,t:12,b:40},yaxis:{title:name,tickformat:asPct?'.0%':undefined},xaxis:{title:'日期'}},{responsive:true,displayModeBar:false})}}).catch(e=>headerMeta.textContent='summary.json 加载失败: '+e.message)</script></body></html>
