<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nasdaq Quant Dashboard V1.5</title><style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:#f6f7f9;color:#111827}main,header{max-width:1100px;margin:auto;padding:24px}h1{margin:0}section{background:white;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{border:1px solid #e5e7eb;border-radius:8px;padding:14px;background:#fbfcfd}.label{color:#6b7280;font-size:12px}.value{font-size:24px;font-weight:750}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}th{background:#f9fafb}</style></head><body><header><h1>Nasdaq Quant Dashboard V1.5</h1><p id="meta">Loading summary.json...</p></header><main><section><h2>数据状态</h2><div id="status" class="grid"></div></section><section><h2>市场分析</h2><div id="market" class="grid"></div></section><section><h2>AI解读</h2><div id="ai"></div></section><section><h2>趋势分析</h2><div id="trend"></div></section><section><h2>风险分析</h2><div id="risk"></div></section><section><h2>Monte Carlo</h2><div id="mc"></div></section><section><h2>指数对比</h2><div id="cmp"></div></section></main><script>const f=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:2}),p=n=>(Number(n)*100).toFixed(2)+'%',card=(a,b,c='')=>`<div class=card><div class=label>${a}</div><div class=value>${b}</div><small>${c}</small></div>`,tbl=(h,r)=>`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(x=>`<tr>${x.map(y=>`<td>${y}</td>`).join('')}</tr>`).join('')}</table>`;fetch('summary.json',{cache:'no-store'}).then(r=>r.json()).then(s=>{let st=s.data_status,sy=s.selected_symbols;meta.textContent=`数据范围 ${s.data_start} 至 ${s.data_end} · 更新时间 ${st.last_update}`;status.innerHTML=[card('数据来源',st.source),card('最新交易日',st.last_trading_day),card('IXIC日期 / 记录',`${st.ixic_last_trading_day} / ${st.ixic_records}`),card('NDX日期 / 记录',`${st.ndx_last_trading_day} / ${st.ndx_records}`)].join('');market.innerHTML=sy.map(k=>{let x=s.symbols[k];return card(`${k} ${x.ticker}`,f(x.latest_close),`趋势 ${x.trend.trend_score} · 风险 ${x.risk.risk_score} · 上涨概率 ${p(x.monte_carlo.probability_up)}`)}).join('');ai.innerHTML=sy.map(k=>{let x=s.symbols[k];return `<p><b>${k}</b> ${x.trend.long_term_trend}，趋势评分 ${x.trend.trend_score}/5，风险评分 ${x.risk.risk_score}/5；未来60天上涨概率 ${p(x.monte_carlo.probability_up)}。低 Token 设计：页面只读取 summary.json，不包含原始 OHLCV。</p>`}).join('');trend.innerHTML=tbl(['指数','最新点位','MA20','MA50','MA200','RSI14','趋势评分','原因'],sy.map(k=>{let x=s.symbols[k],i=x.latest_indicators;return[k,f(x.latest_close),f(i.MA20),f(i.MA50),f(i.MA200),f(i.RSI14),x.trend.trend_score,x.trend.reason]}));risk.innerHTML=tbl(['指数','年化波动率','最大回撤','VaR95','VaR99','风险评分'],sy.map(k=>{let x=s.symbols[k];return[k,p(x.risk.annualized_volatility),p(x.risk.max_drawdown),p(x.risk.var_95),p(x.risk.var_99),x.risk.risk_score]}));mc.innerHTML=sy.map(k=>{let x=s.symbols[k],rows=x.monte_carlo.probability_table.map(r=>[k,r.scenario,p(r.probability)]);rows.push([k,'p10 / p50 / p90',`${f(x.monte_carlo.p10)} / ${f(x.monte_carlo.p50)} / ${f(x.monte_carlo.p90)}`]);return tbl(['指数','未来60天情景','概率/点位'],rows)}).join('<br>');let c=s.comparison;cmp.innerHTML=tbl(['指标','数值'],[['NDX vs IXIC 60日收益差',p(c.ndx_vs_ixic_return_60d)],['60日相关性',Number(c.correlation_60d).toFixed(3)],['60日 Beta',Number(c.ndx_beta_to_ixic_60d).toFixed(3)],['领先关系',c.leadership],['原因',c.reason]])}).catch(e=>meta.textContent='summary.json 加载失败: '+e.message)</script></body></html>
