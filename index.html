<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nasdaq Market Health Dashboard V2</title><style>body{font-family:system-ui,-apple-system,Segoe UI,sans-serif;margin:0;background:#f6f7f9;color:#111827}main,header{max-width:1120px;margin:auto;padding:24px}section{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:16px;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.card{border:1px solid #e5e7eb;border-radius:8px;padding:14px;background:#fbfcfd}.label{color:#6b7280;font-size:12px}.value{font-size:26px;font-weight:780}.small{color:#6b7280;font-size:13px}table{width:100%;border-collapse:collapse}th,td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}th{background:#f9fafb}.green{color:#047857}.yellow{color:#b7791f}.red{color:#b91c1c}.blue{color:#1d4ed8}</style></head><body><header><h1>Nasdaq Market Health Dashboard V2</h1><p id="meta">Loading summary.json...</p></header><main><section><h2>Market Alert</h2><div class="value" id="alert"></div><p class="small" id="alertReason"></p></section><section><h2>市场健康度总览</h2><div id="health" class="grid"></div></section><section><h2>市场分析</h2><div id="market" class="grid"></div></section><section><h2>AI周期明细</h2><div id="ai"></div></section><section><h2>Monte Carlo概率表</h2><div id="mc"></div></section></main><script>const f=n=>Number(n).toLocaleString('en-US',{maximumFractionDigits:2}),p=n=>(Number(n)*100).toFixed(1)+'%',sgn=n=>(Number(n)>=0?'↑ +':'↓ ')+Math.abs(Number(n)).toFixed(2),sgnp=n=>(Number(n)>=0?'↑ +':'↓ ')+Math.abs(Number(n)*100).toFixed(1)+'%',card=(a,b,c='')=>`<div class=card><div class=label>${a}</div><div class=value>${b}</div><div class=small>${c}</div></div>`,tbl=(h,r)=>`<table><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr>${r.map(x=>`<tr>${x.map(y=>`<td>${y}</td>`).join('')}</tr>`).join('')}</table>`;fetch('summary.json',{cache:'no-store'}).then(r=>r.json()).then(s=>{let mh=s.market_health,cur=mh.current,ch=mh.changes_30d,st=mh.statuses,al=mh.alert,sy=s.selected_symbols,icons={green:'🟢',yellow:'🟡',orange:'🟠',red:'🔴'};meta.textContent=`数据截至 ${s.data_end} · 更新时间 ${s.data_status.last_update} · Dashboard只展示summary.json`;alert.textContent=`${icons[al.level]||'🟢'} ${al.label}`;alertReason.textContent=al.reason;health.innerHTML=[card('趋势强度',`${f(cur.trend_score)} / 10`,`近30天 ${sgn(ch.trend_score)} · ${st.trend_strength}`),card('风险水平',`${f(cur.risk_score)} / 10`,`近30天 ${sgn(ch.risk_score)} · ${st.risk_level}`),card('Monte Carlo上涨概率',p(cur.mc_up_probability),`近30天 ${sgnp(ch.mc_up_probability)} · ${st.mc_up_probability}`),card('AI牛市阶段',`${f(cur.ai_cycle_score)}%`,`近30天 ${sgn(ch.ai_cycle_score)} · ${st.ai_cycle}`)].join('');market.innerHTML=sy.map(k=>{let x=s.symbols[k];return card(`${k} ${x.ticker}`,f(x.latest_close),`日期 ${x.latest_date} · 趋势 ${x.trend.trend_score} · 风险 ${x.risk.risk_score} · 上涨概率 ${p(x.monte_carlo.probability_up)} · AI ${x.ai_cycle.stage}`)}).join('');ai.innerHTML=tbl(['指数','AI周期评分','阶段','MA200偏离','Monte Carlo','波动率','回撤'],sy.map(k=>{let a=s.symbols[k].ai_cycle,c=a.components;return[k,`${f(a.score)}%`,a.stage,f(c.ma200_deviation),f(c.monte_carlo),f(c.volatility),f(c.drawdown_risk)]}));mc.innerHTML=sy.map(k=>tbl(['指数','未来60天情景','概率'],s.symbols[k].monte_carlo.probability_table.map(r=>[k,r.scenario,p(r.probability)]))).join('<br>')}).catch(e=>meta.textContent='summary.json加载失败: '+e.message)</script></body></html>
