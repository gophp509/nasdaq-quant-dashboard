<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nasdaq Quant Dashboard</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    :root{--bg:#f4f7f9;--panel:#fff;--ink:#162130;--muted:#667085;--line:#dbe3ea;--blue:#1565c0;--green:#13795b;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:26px 32px 14px;background:var(--panel);border-bottom:1px solid var(--line)}h1{margin:0 0 6px;font-size:28px}h2{margin:0 0 14px;font-size:19px}h3{margin:0 0 10px;font-size:15px}.sub{color:var(--muted);font-size:13px}main{max-width:1280px;margin:0 auto;padding:22px 24px 42px}section{margin:0 0 18px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:8px}.grid{display:grid;gap:12px}.cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.two{grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}.card{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd;min-height:88px}.label{color:var(--muted);font-size:12px;margin-bottom:8px}.value{font-size:25px;font-weight:750}.small{font-size:13px;color:var(--muted);margin-top:6px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-weight:650}.ai{white-space:pre-line;line-height:1.65}.plot{height:340px;width:100%}.good{color:var(--green)}.bad{color:var(--red)}@media(max-width:700px){header,main{padding-left:14px;padding-right:14px}.two{grid-template-columns:1fr}.plot{height:300px}}
  </style>
</head>
<body>
<header><h1>Nasdaq Quant Dashboard</h1><div class="sub" id="meta"></div></header>
<main>
  <section><h2>市场总览</h2><div class="grid cards" id="overview"></div></section>
  <section><h2>AI解读</h2><div class="ai" id="ai"></div></section>
  <section><h2>趋势分析</h2><div id="trend"></div></section>
  <section><h2>风险分析</h2><div id="risk"></div></section>
  <section><h2>Monte Carlo</h2><div class="grid two" id="mc"></div></section>
  <section><h2>回撤分析</h2><div class="grid two" id="dd"></div></section>
</main>
<script>
const summary={"generated_at":"2026-06-20T12:09:39.745391+00:00","data_start":"2010-01-01","data_end":"2026-06-17","selected_symbols":["IXIC","NDX"],"comparison":{"ndx_vs_ixic_return_20d":0.023733,"ndx_vs_ixic_return_60d":0.040979,"ndx_vs_ixic_return_252d":0.031702,"correlation_60d":0.980231,"ndx_beta_to_ixic_60d":1.031054,"leadership":"NDX_outperforming","reason":"NDX leads IXIC by 4.10% over 60d; corr=0.98"},"symbols":{"IXIC":{"ticker":"^IXIC","latest_date":"2026-06-17","latest_close":26021.66,"latest_indicators":{"MA20":26363.0965,"MA50":25474.6556,"MA200":23502.45085,"EMA20":26130.345488,"EMA50":25439.863029,"RSI14":50.208057,"MACD":138.785582,"MACD_signal":245.316038,"MACD_hist":-106.530457,"BB_mid":26363.0965,"BB_upper":27453.956666,"BB_lower":25272.236334},"trend":{"long_term_trend":"bullish","mid_term_trend":"bullish","short_term_momentum":"neutral","trend_score":3,"price_vs_ma200_pct":0.107189,"ma20_vs_ma50_pct":0.034875,"return_20d":0.005835,"reason":"close above MA200; MA20 above MA50; 20d return 0.58%; RSI 50.2"},"risk":{"annualized_volatility":0.203659,"max_drawdown":-0.363953,"var_95":-0.020527,"var_99":-0.037313,"risk_score":3,"reason":"annual vol 20.37%; max drawdown -36.40%; daily VaR95 -2.05%"},"monte_carlo":{"days":60,"paths":5000,"p10":23917.814765,"p50":27267.56863,"p90":30553.412304,"expected_return_low":-0.08085,"expected_return_mid":0.04788,"expected_return_high":0.174153,"probability_up":0.6944,"current_regime":"bull","bull_to_bull_prob":0.985924,"bear_to_bear_prob":0.936639,"reason":"regime starts bull; MA200 split with bull stay 98.6%, bear stay 93.7%"}},"NDX":{"ticker":"^NDX","latest_date":"2026-06-17","latest_close":29670.95,"latest_indicators":{"MA20":29802.58,"MA50":28374.0512,"MA200":25795.98355,"EMA20":29552.762891,"EMA50":28478.302192,"RSI14":53.303172,"MACD":356.501809,"MACD_signal":468.563468,"MACD_hist":-112.061659,"BB_mid":29802.58,"BB_upper":31024.194723,"BB_lower":28580.965277},"trend":{"long_term_trend":"bullish","mid_term_trend":"bullish","short_term_momentum":"neutral","trend_score":3,"price_vs_ma200_pct":0.150216,"ma20_vs_ma50_pct":0.050346,"return_20d":0.029568,"reason":"close above MA200; MA20 above MA50; 20d return 2.96%; RSI 53.3"},"risk":{"annualized_volatility":0.206866,"max_drawdown":-0.355631,"var_95":-0.020821,"var_99":-0.03783,"risk_score":3,"reason":"annual vol 20.69%; max drawdown -35.56%; daily VaR95 -2.08%"},"monte_carlo":{"days":60,"paths":5000,"p10":27285.389899,"p50":31160.955595,"p90":35176.194454,"expected_return_low":-0.080401,"expected_return_mid":0.050218,"expected_return_high":0.185543,"probability_up":0.6892,"current_regime":"bull","bull_to_bull_prob":0.986838,"bear_to_bear_prob":0.932412,"reason":"regime starts bull; MA200 split with bull stay 98.7%, bear stay 93.2%"}}}};
const symbols=Object.keys(summary.symbols),fmt=new Intl.NumberFormat('en-US',{maximumFractionDigits:2}),pct=v=>(v*100).toFixed(2)+'%';
document.getElementById('meta').textContent=`Data through ${summary.data_end} · generated ${summary.generated_at}`;
function card(label,value,small=''){return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="small">${small}</div></div>`}
document.getElementById('overview').innerHTML=symbols.map(s=>{const x=summary.symbols[s];return card(`${s} 点位`,fmt.format(x.latest_close),x.latest_date)+card(`${s} 趋势评分`,x.trend.trend_score,x.trend.long_term_trend)+card(`${s} 风险评分`,x.risk.risk_score,`VaR95 ${pct(x.risk.var_95)}`)+card(`${s} 60天上涨概率`,pct(x.monte_carlo.probability_up),`p50 ${fmt.format(x.monte_carlo.p50)}`)}).join('');
document.getElementById('ai').textContent=[`指数对比：${summary.comparison.reason}`,...symbols.map(s=>{const x=summary.symbols[s],t=x.trend,r=x.risk,m=x.monte_carlo;return `${s} 当前点位 ${fmt.format(x.latest_close)}，长期趋势 ${t.long_term_trend}，中期趋势 ${t.mid_term_trend}，趋势评分 ${t.trend_score}。风险评分 ${r.risk_score}，年化波动率 ${pct(r.annualized_volatility)}，最大回撤 ${pct(r.max_drawdown)}。未来60天上涨概率 ${pct(m.probability_up)}，p10/p50/p90 为 ${fmt.format(m.p10)} / ${fmt.format(m.p50)} / ${fmt.format(m.p90)}。`;})].join('\n');
function table(headers,rows){return `<table><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
document.getElementById('trend').innerHTML=table(['指数','长期趋势(MA200)','中期趋势','短期动量','趋势强度','原因'],symbols.map(s=>{const t=summary.symbols[s].trend;return [s,t.long_term_trend,t.mid_term_trend,t.short_term_momentum,t.trend_score,t.reason]}));
document.getElementById('risk').innerHTML=table(['指数','年化波动率','最大回撤','VaR95','VaR99','风险评分'],symbols.map(s=>{const r=summary.symbols[s].risk;return [s,pct(r.annualized_volatility),pct(r.max_drawdown),pct(r.var_95),pct(r.var_99),r.risk_score]}));
const mc=document.getElementById('mc');symbols.forEach(s=>{mc.insertAdjacentHTML('beforeend',`<div><h3>${s} 未来60天区间</h3><div id="mc-${s}" class="plot"></div></div>`);const m=summary.symbols[s].monte_carlo;Plotly.newPlot(`mc-${s}`,[{x:['p10','p50','p90'],y:[m.p10,m.p50,m.p90],type:'bar',marker:{color:['#b42318','#18222f','#13795b']}}],{margin:{l:55,r:18,t:18,b:42},yaxis:{title:'点位'},annotations:[{text:`上涨概率 ${pct(m.probability_up)} · ${m.paths} paths`,xref:'paper',yref:'paper',x:.02,y:.98,showarrow:false,bgcolor:'#fff'}]},{responsive:true,displayModeBar:false})});
const dd=document.getElementById('dd');symbols.forEach(s=>{dd.insertAdjacentHTML('beforeend',`<div><h3>${s} 回撤摘要</h3><div id="dd-${s}" class="plot"></div></div>`);const r=summary.symbols[s].risk;Plotly.newPlot(`dd-${s}`,[{x:['最大回撤','当前风险评分','VaR95','VaR99'],y:[Math.abs(r.max_drawdown),r.risk_score/5,Math.abs(r.var_95),Math.abs(r.var_99)],type:'bar',marker:{color:['#b42318','#1565c0','#b42318','#b42318']}}],{margin:{l:55,r:18,t:18,b:42},yaxis:{tickformat:'.0%',title:'比例/评分归一化'}},{responsive:true,displayModeBar:false})});
</script>
</body>
</html>
