<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nasdaq Quant Dashboard</title>
<style>
:root{--bg:#f4f7f9;--panel:#fff;--ink:#162130;--muted:#667085;--line:#dbe3ea;--blue:#1565c0;--green:#13795b;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}header{padding:26px 32px 14px;background:var(--panel);border-bottom:1px solid var(--line)}h1{margin:0 0 6px;font-size:28px}h2{margin:0 0 14px;font-size:19px}h3{margin:0 0 12px;font-size:15px}.sub{color:var(--muted);font-size:13px}main{max-width:1280px;margin:0 auto;padding:22px 24px 42px}section{margin:0 0 18px;padding:18px;background:var(--panel);border:1px solid var(--line);border-radius:8px}.grid{display:grid;gap:12px}.cards{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}.two{grid-template-columns:repeat(auto-fit,minmax(360px,1fr))}.card{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd;min-height:88px}.label{color:var(--muted);font-size:12px;margin-bottom:8px}.value{font-size:25px;font-weight:750}.small{font-size:13px;color:var(--muted);margin-top:6px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}th{color:var(--muted);font-weight:650}.ai{white-space:pre-line;line-height:1.65}.chart{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fbfcfd}.barrow{display:grid;grid-template-columns:90px 1fr 76px;align-items:center;gap:10px;margin:10px 0}.track{height:20px;background:#edf2f6;border-radius:4px;overflow:hidden}.bar{height:100%;border-radius:4px}.red{background:var(--red)}.blue{background:var(--blue)}.green{background:var(--green)}.dark{background:#18222f}.note{color:var(--muted);font-size:13px;line-height:1.5;margin-top:12px}.pill{display:inline-block;padding:3px 8px;border-radius:999px;background:#eef4ff;color:#1849a9;font-size:12px}.prob td:last-child,.prob th:last-child{text-align:right}.drawdown{height:150px;display:flex;align-items:flex-end;gap:26px;border-left:1px solid var(--line);border-bottom:1px solid var(--line);padding:8px 12px}.ddbar{width:72px;background:rgba(180,35,24,.75);border-radius:6px 6px 0 0;position:relative}.ddbar span{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:12px;white-space:nowrap}@media(max-width:700px){header,main{padding-left:14px;padding-right:14px}.two{grid-template-columns:1fr}.barrow{grid-template-columns:80px 1fr 64px}.drawdown{gap:18px}.ddbar{width:54px}}
</style>
</head>
<body>
<header><h1>Nasdaq Quant Dashboard</h1><div class="sub" id="meta"></div></header>
<main>
<section><h2>市场总览</h2><div class="grid cards" id="overview"></div></section>
<section><h2>AI解读</h2><div class="ai" id="ai"></div></section>
<section><h2>趋势分析</h2><div id="trend"></div></section>
<section><h2>风险分析</h2><div id="risk"></div></section>
<section><h2>Monte Carlo 概率表</h2><div class="grid two" id="mc"></div></section>
<section><h2>回撤分析</h2><div class="grid two" id="dd"></div></section>
</main>
<script>
const summary={"generated_at":"2026-06-20T12:38:30.274454+00:00","data_start":"2010-01-01","data_end":"2026-06-17","selected_symbols":["IXIC","NDX"],"comparison":{"ndx_vs_ixic_return_20d":0.023733,"ndx_vs_ixic_return_60d":0.040979,"ndx_vs_ixic_return_252d":0.031702,"correlation_60d":0.980231,"ndx_beta_to_ixic_60d":1.031054,"leadership":"NDX_outperforming","reason":"NDX leads IXIC by 4.10% over 60d; corr=0.98"},"symbols":{"IXIC":{"ticker":"^IXIC","latest_date":"2026-06-17","latest_close":26021.66,"latest_indicators":{"MA20":26363.0965,"MA50":25474.6556,"MA200":23502.45085,"RSI14":50.208057},"trend":{"long_term_trend":"bullish","mid_term_trend":"bullish","short_term_momentum":"neutral","trend_score":3,"reason":"close above MA200; MA20 above MA50; 20d return 0.58%; RSI 50.2"},"risk":{"annualized_volatility":0.203659,"max_drawdown":-0.363953,"var_95":-0.020527,"var_99":-0.037313,"risk_score":3},"monte_carlo":{"days":60,"paths":5000,"p10":23917.814765,"p50":27267.56863,"p90":30553.412304,"expected_return_low":-0.08085,"expected_return_mid":0.04788,"expected_return_high":0.174153,"probability_up":0.6944,"probability_table":[{"horizon":"未来60天","scenario":"上涨 > 10%","probability":0.2924},{"horizon":"未来60天","scenario":"上涨 0~10%","probability":0.402},{"horizon":"未来60天","scenario":"下跌 0~5%","probability":0.149},{"horizon":"未来60天","scenario":"下跌 5~10%","probability":0.0836},{"horizon":"未来60天","scenario":"下跌 > 10%","probability":0.073}],"current_regime":"bull"}},"NDX":{"ticker":"^NDX","latest_date":"2026-06-17","latest_close":29670.95,"latest_indicators":{"MA20":29802.58,"MA50":28374.0512,"MA200":25795.98355,"RSI14":53.303172},"trend":{"long_term_trend":"bullish","mid_term_trend":"bullish","short_term_momentum":"neutral","trend_score":3,"reason":"close above MA200; MA20 above MA50; 20d return 2.96%; RSI 53.3"},"risk":{"annualized_volatility":0.206866,"max_drawdown":-0.355631,"var_95":-0.020821,"var_99":-0.03783,"risk_score":3},"monte_carlo":{"days":60,"paths":5000,"p10":27285.389899,"p50":31160.955595,"p90":35176.194454,"expected_return_low":-0.080401,"expected_return_mid":0.050218,"expected_return_high":0.185543,"probability_up":0.6892,"probability_table":[{"horizon":"未来60天","scenario":"上涨 > 10%","probability":0.3134},{"horizon":"未来60天","scenario":"上涨 0~10%","probability":0.3758},{"horizon":"未来60天","scenario":"下跌 0~5%","probability":0.1478},{"horizon":"未来60天","scenario":"下跌 5~10%","probability":0.0908},{"horizon":"未来60天","scenario":"下跌 > 10%","probability":0.0722}],"current_regime":"bull"}}}};
const symbols=Object.keys(summary.symbols),fmt=new Intl.NumberFormat('en-US',{maximumFractionDigits:2}),pct=v=>(v*100).toFixed(2)+'%';
document.getElementById('meta').textContent=`Data through ${summary.data_end} · generated ${summary.generated_at}`;
function card(label,value,small=''){return `<div class="card"><div class="label">${label}</div><div class="value">${value}</div><div class="small">${small}</div></div>`}
document.getElementById('overview').innerHTML=symbols.map(s=>{const x=summary.symbols[s];return card(`${s} 点位`,fmt.format(x.latest_close),x.latest_date)+card(`${s} 趋势评分`,x.trend.trend_score,x.trend.long_term_trend)+card(`${s} 风险评分`,x.risk.risk_score,`VaR95 ${pct(x.risk.var_95)}`)+card(`${s} 60天上涨概率`,pct(x.monte_carlo.probability_up),`p50 ${fmt.format(x.monte_carlo.p50)}`)}).join('');
document.getElementById('ai').textContent=[`指数对比：${summary.comparison.reason}`,...symbols.map(s=>{const x=summary.symbols[s],t=x.trend,r=x.risk,m=x.monte_carlo;return `${s} 当前点位 ${fmt.format(x.latest_close)}，长期趋势 ${t.long_term_trend}，中期趋势 ${t.mid_term_trend}，趋势评分 ${t.trend_score}。风险评分 ${r.risk_score}，年化波动率 ${pct(r.annualized_volatility)}，最大回撤 ${pct(r.max_drawdown)}。未来60天上涨概率 ${pct(m.probability_up)}，其中上涨超过10%的概率为 ${pct(m.probability_table[0].probability)}。`;})].join('\n');
function table(headers,rows,klass=''){return `<table class="${klass}"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
document.getElementById('trend').innerHTML=table(['指数','长期趋势(MA200)','中期趋势','短期动量','趋势强度','原因'],symbols.map(s=>{const t=summary.symbols[s].trend;return [s,t.long_term_trend,t.mid_term_trend,t.short_term_momentum,t.trend_score,t.reason]}));
document.getElementById('risk').innerHTML=table(['指数','年化波动率','最大回撤','VaR95','VaR99','风险评分'],symbols.map(s=>{const r=summary.symbols[s].risk;return [s,pct(r.annualized_volatility),pct(r.max_drawdown),pct(r.var_95),pct(r.var_99),r.risk_score]}));
function row(label,val,cls){return `<div class="barrow"><div>${label}</div><div class="track"><div class="bar ${cls}" style="width:${Math.max(4,val*100)}%"></div></div><div>${pct(val)}</div></div>`}
function mcCard(s){const m=summary.symbols[s].monte_carlo,rows=m.probability_table.map(x=>[x.scenario,pct(x.probability)]);return `<div class="chart"><h3>${s} <span class="pill">${m.paths} paths</span></h3>${table(['未来60天','概率'],rows,'prob')}${row('>10%',m.probability_table[0].probability,'green')}${row('0~10%',m.probability_table[1].probability,'blue')}${row('跌0~5%',m.probability_table[2].probability,'dark')}${row('跌5~10%',m.probability_table[3].probability,'red')}${row('跌>10%',m.probability_table[4].probability,'red')}<div class="note">p10/p50/p90：${fmt.format(m.p10)} / ${fmt.format(m.p50)} / ${fmt.format(m.p90)}；预期收益区间 ${pct(m.expected_return_low)} 到 ${pct(m.expected_return_high)}。</div></div>`}
document.getElementById('mc').innerHTML=symbols.map(mcCard).join('');
function ddChart(s){const r=summary.symbols[s].risk,vals=[['最大回撤',Math.abs(r.max_drawdown)],['VaR95',Math.abs(r.var_95)],['VaR99',Math.abs(r.var_99)],['风险评分',r.risk_score/5]];return `<div class="chart"><h3>${s} 回撤摘要</h3><div class="drawdown">${vals.map(([k,v])=>`<div><div class="ddbar" style="height:${Math.max(8,v*250)}px"><span>${k}<br>${k==='风险评分'?summary.symbols[s].risk.risk_score:pct(v)}</span></div></div>`).join('')}</div><div class="note">历史最大回撤 ${pct(r.max_drawdown)}；风险评分 ${r.risk_score}/5；VaR95 ${pct(r.var_95)}，VaR99 ${pct(r.var_99)}。</div></div>`}
document.getElementById('dd').innerHTML=symbols.map(ddChart).join('');
</script>
</body>
</html>
